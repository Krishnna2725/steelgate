name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build -- --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: SteelGate-Windows
          path: release-final/SteelGate-*-Setup.exe
